# RC Engage Voice Call Streaming receiver — WebSocket Secure endpoint.
#
# Paste this `location` block into the HTTPS server section of
# /etc/nginx/sites-enabled/chainsaw-ops, between the existing /api/kb/chat
# and / locations. Reload nginx after.
#
# Public URL → wss://ops.jonoandjohno.com.au/voice-stream
# Backend    → ws://127.0.0.1:3333 (rcx-stream.service)
#
# Notes:
# - proxy_http_version 1.1 + Upgrade/Connection headers are mandatory
#   for WebSocket. Without them nginx will return 400 on the handshake.
# - proxy_buffering off so audio frames flow through immediately, not
#   batched at the proxy layer.
# - Long read timeout because calls can run for 30+ minutes. RC pings
#   keep the connection alive; we have ping_interval=20s on our side.
# - Body size limit is large because RC sends ~3 KB JSON frames every
#   20ms. nginx's default client_max_body_size of 1m can interfere with
#   long-lived WSS connections that accumulate unread frames on slow
#   downstreams; bump it to a generous 50m.

location /voice-stream {
    proxy_pass http://127.0.0.1:3333;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 50m;
}

# Browser-side audio fan-out — agent's browser subscribes here to listen
# to a live call. Token-gated by Flask, then validated server-side by
# the same rcx-stream-server process that receives the producer stream.
location /listen {
    proxy_pass http://127.0.0.1:3333;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
